services:
  openclaw-dashboard:
    build: .
    container_name: openclaw-dashboard
    restart: always
    ports:
      - "5055:5055"
    environment:
      - OPENCLAW_GATEWAY_URL=http://openclaw-gateway:18789
      - OPENCLAW_GATEWAY_TOKEN=
      - LM_STUDIO_URL=http://192.168.1.5:1234
      - DATA_FILE=/data/workspaces.json
      - PORT=5055
    volumes:
      - dashboard_data:/data
    networks:
      - openclaw_net

volumes:
  dashboard_data:

networks:
  openclaw_net:
    external: true